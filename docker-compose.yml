
services:

  # -------------------------------------------------------------------------
  # PostgreSQL — message archive database (persistent service)
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: chat-summarizer-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # -------------------------------------------------------------------------
  # Ollama — local LLM inference server
  # Pull model first: docker compose run --rm ollama ollama pull llama3.1:8b
  # -------------------------------------------------------------------------
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: chat-summarizer-ollama
  #   restart: "no"
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ./ollama-models:/root/.ollama
  #   environment:
  #     - OLLAMA_KEEP_ALIVE=0
  #   # Remove the 'deploy' block if running CPU-only (no NVIDIA GPU)
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 30s

  # -------------------------------------------------------------------------
  # chat-summarizer — Python application (runs once and exits)
  # Usage: docker compose run --rm app
  # Usage (prune): docker compose run -it --rm app --prune
  #
  # Per-channel fetch cursors are stored in the Postgres channel_state table
  # rather than a local state.json file, so no state file bind mount is needed.
  # -------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-summarizer-app
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      # ollama:
      #   condition: service_healthy
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./summaries:/app/summaries
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1

  # -------------------------------------------------------------------------
  # ---- TESTING PROFILE ----------------------------------------------------
  # The three services below only start when you pass --profile testing.
  # They provide a self-contained Rocket.Chat instance for local development
  # and integration testing without touching any production server.
  #
  # Start:    docker compose --profile testing up -d
  # Stop:     docker compose --profile testing down
  # Reset:    docker compose --profile testing down -v   (wipes all data)
  # -------------------------------------------------------------------------

  # MongoDB — required by Rocket.Chat (must run as a replica set)
  mongo:
    image: mongo:8.3.4
    container_name: chat-summarizer-mongo
    restart: unless-stopped
    command: mongod --replSet rs0 --oplogSize 128
    # Works around a MongoDB 8.x crash on Linux kernel 6.19+: the bundled
    # TCMalloc violates the kernel's rseq ABI. Remove once MongoDB ships a
    # patched TCMalloc. See https://jira.mongodb.org/browse/SERVER-121912
    environment:
      GLIBC_TUNABLES: "glibc.pthread.rseq=1"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles: [testing]

  # One-shot container that initialises the MongoDB replica set on first start.
  # Safe to re-run: the rs.initiate() call is wrapped in a try/catch so it is
  # a no-op if the replica set is already configured.
  mongo-init-replica:
    image: mongo:8.3.4
    container_name: chat-summarizer-mongo-init
    restart: "no"
    depends_on:
      mongo:
        condition: service_healthy
    command: >
      mongosh --host mongo:27017 --eval
      "try { rs.status(); print('replica set already initialised') }
       catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}); print('replica set initialised') }"
    profiles: [testing]

  # Rocket.Chat — no host port of its own. Reached at https://localhost:3030
  # from the host browser via the rocketchat-proxy TLS proxy below, and at
  # http://rocketchat:3000 (plain, unproxied) from within the Docker network
  # (app service).
  #
  # The admin account is auto-provisioned (see ADMIN_* below). On first start
  # the setup wizard may still appear and try to email a Cloud-registration
  # security code, which never arrives for admin@localhost — just skip/ignore
  # that screen and reload the root URL; it drops you straight into the
  # normal login page since the account already exists. See README.md —
  # Testing with a local Rocket.Chat instance.
  #
  # Pinned (not :latest): Rocket.Chat's minimum-supported MongoDB version keeps
  # rising, and mongo/mongo-init-replica below must satisfy whatever version
  # this pin requires. If you bump this image, check Rocket.Chat's MongoDB
  # compatibility requirements and bump the mongo images to match, or the
  # container will crash-loop with a "MongoDB version not supported" error.
  rocketchat:
    image: rocket.chat:8.5.1
    container_name: chat-summarizer-rocketchat
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init-replica:
        condition: service_completed_successfully
    environment:
      # Points at the HTTPS proxy below, which is now the only host-facing
      # entry point. Built from RC_URL and RC_PORT in .env.
      ROOT_URL: "${RC_URL}:${RC_PORT}"
      # Defines the internal port the NodesJS will bind to when starting the service.
      PORT: "3000"
      MONGO_URL: mongodb://mongo:27017/rocketchat?replicaSet=rs0
      MONGO_OPLOG_URL: mongodb://mongo:27017/local?replicaSet=rs0
      # Auto-provisions the admin account on first boot, skipping the manual
      # "Admin Info" wizard step. Safe to leave in place indefinitely; it's a
      # no-op once the account exists.
      ADMIN_USERNAME: admin
      ADMIN_EMAIL: admin@localhost
      ADMIN_PASS: admin
      # Forces the wizard straight to "completed" on every boot (fresh volume
      # or not), skipping the Cloud-registration screen. That screen emails a
      # verification "security code" via Rocket.Chat Cloud to confirm the
      # admin email, which never arrives for a fake local address like
      # admin@localhost and otherwise blocks setup entirely.
      OVERWRITE_SETTING_Show_Setup_Wizard: completed
      # Rocket.Chat defaults to requiring 2FA confirmation (TOTP or email) for
      # sensitive account actions like changing a password, even via the admin
      # API. The admin account here has no 2FA method configured (its email,
      # admin@localhost, can't receive a code either), so that requirement is
      # permanently unsatisfiable and locks the admin out of those actions
      # entirely. Harmless to disable for this throwaway local test instance.
      OVERWRITE_SETTING_Accounts_TwoFactorAuthentication_Enabled: "false"
      # Default API rate limit here is 10 calls/60s, which is far too tight
      # for scripts/seed_rocketchat.py (~100+ calls to create test data).
      # Fine to disable entirely on a throwaway local test instance.
      OVERWRITE_SETTING_API_Enable_Rate_Limiter: "false"
    profiles: [testing]

  # One-shot container that generates a self-signed TLS certificate for
  # rocketchat-proxy into the rocketchat-proxy-certs volume, if one doesn't
  # already exist. Safe to re-run — existing certs are left in place.
  rocketchat-proxy-cert-init:
    image: alpine:3.20
    container_name: chat-summarizer-rocketchat-proxy-cert-init
    restart: "no"
    environment:
      # Pulled from .env (Compose auto-loads it for interpolation). Its host
      # is added to the cert's SAN list alongside the usual localhost
      # entries, so the cert stays valid whatever RC_URL points at.
      RC_URL: "${RC_URL}"
    volumes:
      - rocketchat-proxy-certs:/certs
    command:
      - sh
      - -c
      - |
        set -e
        if [ -f /certs/rocketchat.crt ]; then
          echo "Certificate already exists, skipping."
        else
          apk add --no-cache openssl >/dev/null
          # Strip scheme, path, and port from RC_URL to get just the host.
          # Doubled dollar signs below are literal, passed through to the
          # container's shell — Compose interpolates variables in this file
          # too, so single dollar signs here would be (wrongly) resolved by
          # Compose itself rather than by sh at container runtime.
          rc_host=$$(echo "$${RC_URL:-localhost}" | sed -E 's#^[a-zA-Z][a-zA-Z0-9+.-]*://##; s#/.*##; s#:[0-9]+$##')
          if echo "$$rc_host" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
            rc_san="IP:$$rc_host"
          else
            rc_san="DNS:$$rc_host"
          fi
          openssl req -x509 -nodes -newkey rsa:2048 -days 825 \
            -keyout /certs/rocketchat.key -out /certs/rocketchat.crt \
            -subj "/CN=$$rc_host" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1,$$rc_san"
          echo "Generated self-signed certificate for rocketchat-proxy (CN=$$rc_host)."
        fi
    profiles: [testing]

  # TLS-terminating reverse proxy in front of Rocket.Chat. This is the only
  # host-facing entry point for Rocket.Chat now — https://localhost:3030.
  # Browsers will show a self-signed-certificate warning on first visit;
  # that's expected for a local test instance, click through it (or import
  # the generated cert from the rocketchat-proxy-certs volume as trusted).
  rocketchat-proxy:
    image: nginx:1.27-alpine
    container_name: chat-summarizer-rocketchat-proxy
    restart: unless-stopped
    depends_on:
      rocketchat-proxy-cert-init:
        condition: service_completed_successfully
      rocketchat:
        condition: service_started
    ports:
      - "3030:443"
    volumes:
      - ./nginx/rocketchat.conf:/etc/nginx/conf.d/default.conf:ro
      - rocketchat-proxy-certs:/certs:ro
    profiles: [testing]

volumes:
  postgres-data:          # Persists Postgres data across container restarts and rebuilds
  mongo-data:             # Persists Rocket.Chat's MongoDB data across restarts
  rocketchat-proxy-certs: # Self-signed TLS cert/key for the local Rocket.Chat HTTPS proxy
