# TLS-terminating reverse proxy for the local Rocket.Chat test stack.
# Mounted into rocketchat-proxy at /etc/nginx/conf.d/default.conf.
# See README.md — "Testing with a local Rocket.Chat instance".

# Rocket.Chat's realtime API needs a WebSocket connection upgraded through
# the proxy; fall back to closing the connection for plain HTTP requests.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name localhost;

    ssl_certificate     /certs/rocketchat.crt;
    ssl_certificate_key /certs/rocketchat.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 200M;

    location / {
        proxy_pass http://rocketchat:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 90s;
    }
}
